<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSYK AI Matchning</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f5f7fb;
  margin: 0;
}

.container {
  max-width: 800px;
  margin: 60px auto;
  padding: 30px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h1 {
  margin-top: 0;
}

.subtitle {
  color: #666;
  margin-bottom: 20px;
}

label {
  font-weight: 600;
  display: block;
  margin-top: 20px;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 14px;
}

textarea {
  height: 120px;
  resize: vertical;
}

button {
  width: 100%;
  margin-top: 25px;
  padding: 14px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(135deg, #0070f3, #0051a8);
  color: white;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  opacity: 0.95;
}

.result {
  margin-top: 30px;
}

.card {
  padding: 15px;
  border-radius: 10px;
  border: 1px solid #eee;
  margin-bottom: 15px;
  transition: 0.2s;
}

.card:hover {
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

.badge {
  display: inline-block;
  padding: 4px 8px;
  font-size: 12px;
  border-radius: 6px;
  background: #eef3ff;
  color: #0070f3;
}

.loading {
  text-align: center;
  margin-top: 20px;
}

.footer {
  text-align: center;
  margin-top: 40px;
  font-size: 12px;
  color: #888;
}
</style>

</head>

<body>

<div class="container">

  <h1>SSYK AI Matchning</h1>
  <p class="subtitle">
    Beskriv en roll och få automatiskt SSYK‑kod + lönedata baserat på AI.
  </p>

  <label>Jobbtitel</label>
  <input id="title" placeholder="t.ex. Backendutvecklare">

  <label>Beskrivning av rollen</label>
  <textarea id="desc" placeholder="Beskriv arbetsuppgifter, ansvar, tekniker..."></textarea>

  <button onclick="analysera()">Analysera roll</button>

  <div id="result" class="result"></div>

  <div class="footer">
    Powered by AI • SSYK + SCB data (estimerad)
  </div>

</div>

<script>
async function analysera() {

  const title = document.getElementById("title").value;
  const desc = document.getElementById("desc").value;

  const resultDiv = document.getElementById("result");

  resultDiv.innerHTML = `
    <div class="loading">⏳ Analyserar med AI...</div>
  `;

  try {
    const res = await fetch("https://ssyk-two.vercel.app/api/ssyk", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ title, desc })
    });

    const data = await res.json();

    resultDiv.innerHTML = `
      <h3>Top matchningar</h3>

      ${data.results.map(r => `
        <div class="card">
          <p><strong>${r.title}</strong></p>
          <p class="badge">SSYK ${r.ssyk}</p>
          <p>Confidence: ${r.confidence}%</p>
          <p>10:e percentil: <strong>${r.p10} kr</strong></p>
        </div>
      `).join("")}
    `;

  } catch (err) {
    resultDiv.innerHTML = `
      <p style="color:red;">❌ Något gick fel. Kontrollera backend.</p>
    `;
    console.error(err);
  }
}
</script>

</body>
</html>
