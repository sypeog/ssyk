<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>SSYK-väljare</title>

<style>
body { font-family: Arial; max-width: 800px; margin: 40px auto; }
input, textarea { width: 100%; margin-top: 10px; }
button { margin-top: 15px; padding: 10px; }
.result { margin-top: 20px; padding: 15px; border: 1px solid #ccc; }
</style>
</head>

<body>

<h1>SSYK AI-matchning</h1>

<label>Jobbtitel</label>
<input id="title">

<label>Beskrivning</label>
<textarea id="desc"></textarea>

<button onclick="analysera()">Analysera</button>

<div id="result" class="result"></div>

<script>
async function analysera() {
  const title = document.getElementById("title").value;
  const desc = document.getElementById("desc").value;

  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = "Analyserar...";

  const res = await fetch("https://DIN-BACKEND-URL/api/ssyk", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ title, desc })
  });

  const data = await res.json();

  resultDiv.innerHTML = `
    <h3>Top 3 matchningar</h3>
    ${data.results.map(r => `
      <div>
        <p><b>${r.title}</b> (SSYK ${r.ssyk})</p>
        <p>Confidence: ${r.confidence}%</p>
        <p>10:e percentil: ${r.p10} kr</p>
        <hr>
      </div>
    `).join("")}
  `;
}
</script>

</body>
</html>
``
